name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: Build + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test --if-present

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint --if-present

  privacy-review:
    name: Kids Privacy Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code
      - name: Run kids-privacy-officer
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p .pr-review
          git diff origin/main...HEAD > .pr-review/pr.diff
          claude -p "Use the kids-privacy-officer subagent to review the diff at .pr-review/pr.diff against the rules in CLAUDE.md and .claude/agents/kids-privacy-officer.md. Output the structured PR comment per your instructions. The very last line of your output must be the VERDICT line on its own line (for example 'VERDICT: PASSED' or 'VERDICT: BLOCKED') with no markdown, prose, code fences, or trailing content after it." \
            --output-format text > .pr-review/review.txt
          cat .pr-review/review.txt
      - name: Post review to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('.pr-review/review.txt', 'utf8');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
      - name: Fail on BLOCKED verdict
        run: |
          if tail -5 .pr-review/review.txt | grep -q "^VERDICT: BLOCKED$"; then
            echo "Kids-privacy-officer blocked this PR. See review comment."
            exit 1
          fi