name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: Build + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Require package-lock.json
        run: test -f package-lock.json || { echo "::error::package-lock.json missing — refusing to false-green"; exit 1; }
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Require package-lock.json
        run: test -f package-lock.json || { echo "::error::package-lock.json missing — refusing to false-green"; exit 1; }
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test --if-present

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Require package-lock.json
        run: test -f package-lock.json || { echo "::error::package-lock.json missing — refusing to false-green"; exit 1; }
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint --if-present

  audio-cache-bust:
    name: Audio cache-bust guard
    runs-on: ubuntu-latest
    # PR-only: the rule is "a PR that changes *.mp3 must also update the
    # manifest version." On a direct push to main there is no base branch to
    # diff against.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require MANIFEST_VERSION bump when committed *.mp3 files change (FV-142)
        run: |
          set -euo pipefail
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          git fetch --no-tags origin "$BASE_REF"
          RANGE="origin/${BASE_REF}...HEAD"

          MP3_CHANGED=$(git diff --name-only "$RANGE" | grep -E '\.mp3$' || true)
          if [ -z "$MP3_CHANGED" ]; then
            echo "No *.mp3 changes in this PR — manifest-version guard not applicable."
            exit 0
          fi

          # FV-227: beds are NOT clips. MP3s under apps/web/public/audio/beds/
          # do not require a MANIFEST_VERSION bump — they have their own path and
          # cache route (/audio/beds/*) separate from the clips catalog. Strip them
          # from the list before the guard check so the guard remains scoped to
          # clip MP3s only (the correct semantic).
          MP3_CHANGED=$(echo "$MP3_CHANGED" | grep -v '^apps/web/public/audio/beds/' || true)
          if [ -z "$MP3_CHANGED" ]; then
            echo "Only beds MP3s changed — manifest-version guard not applicable (beds are not clips)."
            exit 0
          fi

          echo "Changed clip *.mp3 files:"
          echo "$MP3_CHANGED"

          # FV-142: clip files are content-addressed (<slug>.<hash8>.mp3).
          # A new regen always produces a new hash8 in the filename AND updates
          # MANIFEST_VERSION in audio-mapping.ts (the catalog content-hash).
          # A bump = a newly-added MANIFEST_VERSION assignment with a quoted value.
          # The [^/]* guard + required `= "` exclude comment lines.
          MAPPING="apps/web/components/pregame/audio-mapping.ts"
          if git diff "$RANGE" -- "$MAPPING" | grep -qE '^\+[^/]*MANIFEST_VERSION[[:space:]]*=[[:space:]]*"'; then
            echo "✓ MANIFEST_VERSION was updated in $MAPPING."
            exit 0
          fi

          echo "::error file=${MAPPING}::This PR changes *.mp3 files but does not update MANIFEST_VERSION. Any committed *.mp3 change requires a MANIFEST_VERSION update in audio-mapping.ts and sw.js (CLAUDE.md → Project Workflow Config)."
          exit 1

      - name: Require MANIFEST_VERSION to match between audio-mapping.ts and sw.js (FV-142)
        run: |
          set -euo pipefail
          # The hand-rolled service worker (public/sw.js) can't import the TS
          # constant, so it keeps its own copy. They MUST match or the window-side
          # precache and the SW open different caches and offline audio silently
          # breaks (FV-106 / FV-142). Runs on every PR.
          MAPPING="apps/web/components/pregame/audio-mapping.ts"
          SW="apps/web/public/sw.js"
          # Extract the MANIFEST_VERSION string from a TS/JS file. Anchored to an
          # actual `const` / `export const` declaration (leading indentation OK),
          # so it never matches comment lines that merely mention MANIFEST_VERSION.
          extract_mv() {
            grep -oE '^[[:space:]]*(export[[:space:]]+)?const[[:space:]]+MANIFEST_VERSION[[:space:]]*=[[:space:]]*"[^"]*"' "$1" \
              | grep -oE '"[^"]*"' | head -1 || true
          }
          TS_MV=$(extract_mv "$MAPPING")
          SW_MV=$(extract_mv "$SW")
          echo "audio-mapping.ts MANIFEST_VERSION = ${TS_MV:-<none>}"
          echo "sw.js            MANIFEST_VERSION = ${SW_MV:-<none>}"
          if [ -z "$TS_MV" ] || [ -z "$SW_MV" ]; then
            echo "::error::Could not find MANIFEST_VERSION in both $MAPPING and $SW."
            exit 1
          fi
          if [ "$TS_MV" != "$SW_MV" ]; then
            echo "::error file=${SW}::MANIFEST_VERSION mismatch — $MAPPING has ${TS_MV}, $SW has ${SW_MV}. Update both in the same PR (CLAUDE.md → Project Workflow Config)."
            exit 1
          fi
          echo "✓ MANIFEST_VERSION is in sync ($TS_MV)."

  script-book-lint:
    name: Script book lint
    runs-on: ubuntu-latest
    # PR-only, diff-scoped like audio-cache-bust: this is a static content
    # gate over docs/scripts/*.md, so only run it when the PR actually
    # touches a script book or the lint script itself.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check whether script books or the lint script changed (FV-400)
        id: changed
        run: |
          set -euo pipefail
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          git fetch --no-tags origin "$BASE_REF"
          RANGE="origin/${BASE_REF}...HEAD"

          CHANGED=$(git diff --name-only "$RANGE" | grep -E '^docs/scripts/.*\.md$|^apps/web/scripts/lint-script-books\.ts$' || true)
          if [ -z "$CHANGED" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "No script-book or lint-script changes in this PR — skipping."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Changed files:"
            echo "$CHANGED"
          fi
      - uses: actions/setup-node@v4
        if: steps.changed.outputs.run == 'true'
        with:
          # Node 22, not 20: the lint script runs via --experimental-strip-types,
          # which doesn't exist until Node 22.6 — on 20 the job dies with
          # "node: bad option" before the lint runs. 22 also matches the E2E
          # job and the prod/Vercel runtime (≥22).
          node-version: '22'
      - name: Run banned-phrase + reframe-repetition lint (FV-400)
        if: steps.changed.outputs.run == 'true'
        # Dependency-free (node stdlib only) — no `npm ci` needed, same as
        # this file's own path-filtered guard style (athlete-no-tracking.yml).
        run: node --experimental-strip-types apps/web/scripts/lint-script-books.ts

# FV-4: The privacy gate lives in .github/workflows/privacy-verdict.yml.
# It publishes a `Require privacy VERDICT` commit status on every PR that
# touches a privacy-sensitive path, and flips to green only when the
# kids-privacy-officer posts `VERDICT: APPROVED`. The check is a required
# status check in the `main` branch ruleset (id 16564177), so a privacy-path
# PR cannot merge without an explicit APPROVED verdict — converting the
# CLAUDE.md "Privacy override (HARD RULE)" from prose into mechanism.

  # ---------------------------------------------------------------------------
  # FV-168: E2E tests (NON-REQUIRED)
  #
  # Runs the full Playwright suite against a local Supabase stack.
  # NOT a required check — promote to required after ≥1 week of observed
  # stability (edit the `main` branch ruleset in GitHub Settings → Branches).
  #
  # Reusable plumbing: the supabase-start steps are intentionally extracted
  # so FV-166 (RLS harness) can reference the same pattern.
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E Tests (non-required)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Detect lockfile
        id: lockfile
        run: |
          # Root-lockfile workspace (workspaces: ["apps/*"]) — the lockfile and
          # `npm ci` live at the repo root, matching the build/test/lint jobs.
          # The old apps/web/package-lock.json path never existed, so every E2E
          # step silently skipped and the job reported a false-green (FV-168).
          if [ -f package-lock.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No package-lock.json — repo not yet bootstrapped. Skipping E2E."
          fi

      - uses: actions/setup-node@v4
        if: steps.lockfile.outputs.exists == 'true'
        with:
          # Node 22, not 20: @supabase/supabase-js eagerly builds a Realtime
          # client in global-setup/teardown's createClient(), which needs a
          # native global WebSocket — stabilized in Node 22, absent in 20.
          # On 20 the suite dies at setup before any test runs. 22 also matches
          # the prod/Vercel runtime (≥22), where createClient already works.
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        if: steps.lockfile.outputs.exists == 'true'
        run: npm ci

      # ------------------------------------------------------------------
      # Supabase local stack
      # ------------------------------------------------------------------
      - uses: supabase/setup-cli@v1
        if: steps.lockfile.outputs.exists == 'true'
        with:
          version: latest

      - name: Start Supabase local stack
        if: steps.lockfile.outputs.exists == 'true'
        run: supabase start

      - name: Apply migrations to local stack
        if: steps.lockfile.outputs.exists == 'true'
        run: supabase db push --local

      - name: Extract Supabase local keys
        if: steps.lockfile.outputs.exists == 'true'
        id: supabase
        run: |
          # Use machine-readable output (-o env) so label changes in future CLI
          # versions don't silently produce empty keys.
          eval "$(supabase status -o env)"
          # Mask the service role key so it never appears in downstream log lines.
          echo "::add-mask::${SERVICE_ROLE_KEY}"
          echo "anon_key=${ANON_KEY}" >> "$GITHUB_OUTPUT"
          echo "service_role_key=${SERVICE_ROLE_KEY}" >> "$GITHUB_OUTPUT"

      # ------------------------------------------------------------------
      # Playwright browsers (cached by lockfile hash)
      # ------------------------------------------------------------------
      - name: Cache Playwright browsers
        if: steps.lockfile.outputs.exists == 'true'
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.lockfile.outputs.exists == 'true' && steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      # ------------------------------------------------------------------
      # E2E test run
      #
      # playwright.config.ts webServer starts `npm run build && npm run start`
      # on CI (process.env.CI=true), so no separate build step is needed.
      # The build env vars come from the step env block below, which is
      # forwarded to the webServer process via playwright.config.ts's env map.
      #
      # dotenv-cli requires .env.test to exist; we write a stub so it doesn't
      # fail — real values are already in the step environment.
      # ------------------------------------------------------------------
      - name: Write .env.test stub for dotenv-cli
        if: steps.lockfile.outputs.exists == 'true'
        run: echo "# CI — values injected via step env" > apps/web/.env.test

      - name: Run E2E tests
        if: steps.lockfile.outputs.exists == 'true'
        run: npm run test:e2e
        working-directory: apps/web
        env:
          CI: true
          E2E_BASE_URL: http://localhost:3000
          E2E_SUPABASE_URL: http://127.0.0.1:54321
          E2E_SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key }}
          E2E_SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_role_key }}
          # Forwarded to the Next.js build+start (webServer env block reads these)
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_role_key }}
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

      - name: Upload Playwright report on failure
        if: failure() && steps.lockfile.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/

  # ---------------------------------------------------------------------------
  # FV-166: RLS verification harness (NON-REQUIRED)
  #
  # Machine-verifies the minor-data privacy boundaries (journal_entries,
  # athlete_session_metadata, subscriptions, device_pairings, safety_events)
  # against a real Postgres with RLS on. Role-scoped via `request.jwt.claims`
  # + `set role authenticated|anon` — the same session state PostgREST
  # establishes after verifying a JWT (see supabase/tests/rls/README.md).
  #
  # Deliberately a SEPARATE job from `e2e`: a flaky browser test must never be
  # able to mask an RLS regression. No node/app build — just the DB + psql.
  #
  # Reuses the FV-168 supabase-start plumbing (supabase start + db push).
  # Promote to required after ≥1 week of observed stability (edit the `main`
  # branch ruleset in GitHub Settings → Branches).
  # ---------------------------------------------------------------------------
  rls:
    name: RLS Harness (non-required)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Verify psql is available
        run: psql --version

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local stack
        run: supabase start

      - name: Apply migrations to local stack
        run: supabase db push --local

      - name: Run RLS harness
        run: |
          # Resolve DB_URL from the machine-readable status output.
          # Old CLI (v1.x) exports DB_URL; newer CLI (v2.x) exports
          # SUPABASE_DB_URL. If neither is set (e.g. output format changed
          # again), fall back to the known local default from
          # supabase/config.toml (db.port = 54322). The local stack is
          # already running from the prior step, so the fallback will work.
          eval "$(supabase status -o env 2>/dev/null || true)"
          DB_URL="${DB_URL:-${SUPABASE_DB_URL:-}}"
          if [ -z "${DB_URL:-}" ]; then
            DB_URL="postgresql://postgres:postgres@127.0.0.1:54322/postgres"
            echo "::notice::DB_URL not exported by 'supabase status -o env'; using known local default (port 54322)"
          fi
          bash supabase/tests/rls/run.sh "$DB_URL"