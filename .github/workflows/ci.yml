name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: Build + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect lockfile
        id: lockfile
        run: |
          if [ -f package-lock.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No package-lock.json — repo not yet bootstrapped. Skipping npm steps."
          fi
      - uses: actions/setup-node@v4
        if: steps.lockfile.outputs.exists == 'true'
        with:
          node-version: '20'
          cache: 'npm'
      - if: steps.lockfile.outputs.exists == 'true'
        run: npm ci
      - if: steps.lockfile.outputs.exists == 'true'
        run: npm run typecheck
      - if: steps.lockfile.outputs.exists == 'true'
        run: npm run build

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect lockfile
        id: lockfile
        run: |
          if [ -f package-lock.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No package-lock.json — repo not yet bootstrapped. Skipping npm steps."
          fi
      - uses: actions/setup-node@v4
        if: steps.lockfile.outputs.exists == 'true'
        with:
          node-version: '20'
          cache: 'npm'
      - if: steps.lockfile.outputs.exists == 'true'
        run: npm ci
      - if: steps.lockfile.outputs.exists == 'true'
        run: npm test --if-present

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect lockfile
        id: lockfile
        run: |
          if [ -f package-lock.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No package-lock.json — repo not yet bootstrapped. Skipping npm steps."
          fi
      - uses: actions/setup-node@v4
        if: steps.lockfile.outputs.exists == 'true'
        with:
          node-version: '20'
          cache: 'npm'
      - if: steps.lockfile.outputs.exists == 'true'
        run: npm ci
      - if: steps.lockfile.outputs.exists == 'true'
        run: npm run lint --if-present

  audio-cache-bust:
    name: Audio cache-bust guard
    runs-on: ubuntu-latest
    # PR-only: the rule is "a PR that changes *.mp3 must also bump the cache
    # bust." On a direct push to main there is no base branch to diff against.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require AUDIO_CACHE_BUST bump when committed *.mp3 files change
        run: |
          set -euo pipefail
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          git fetch --no-tags origin "$BASE_REF"
          RANGE="origin/${BASE_REF}...HEAD"

          MP3_CHANGED=$(git diff --name-only "$RANGE" | grep -E '\.mp3$' || true)
          if [ -z "$MP3_CHANGED" ]; then
            echo "No *.mp3 changes in this PR — cache-bust guard not applicable."
            exit 0
          fi

          echo "Changed *.mp3 files:"
          echo "$MP3_CHANGED"

          # A bump = a newly-added AUDIO_CACHE_BUST assignment with a quoted
          # value, e.g.  +export const AUDIO_CACHE_BUST = "12";
          # The [^/]* guard + required `= "` exclude comment lines that merely
          # mention AUDIO_CACHE_BUST (a false-pass the looser pattern allowed).
          MAPPING="apps/web/components/pregame/audio-mapping.ts"
          if git diff "$RANGE" -- "$MAPPING" | grep -qE '^\+[^/]*AUDIO_CACHE_BUST[[:space:]]*=[[:space:]]*"'; then
            echo "✓ AUDIO_CACHE_BUST was bumped in $MAPPING."
            exit 0
          fi

          echo "::error file=${MAPPING}::This PR changes *.mp3 files but does not bump AUDIO_CACHE_BUST. Any committed *.mp3 change requires an AUDIO_CACHE_BUST bump (CLAUDE.md → Project Workflow Config)."
          exit 1

      - name: Require AUDIO_CACHE_BUST to match between audio-mapping.ts and sw.js
        run: |
          set -euo pipefail
          # The hand-rolled service worker (public/sw.js) can't import the TS
          # constant, so it keeps its own copy. They MUST match or the window-side
          # precache and the SW open different caches and offline audio silently
          # breaks (FV-106). Runs on every PR, not just *.mp3 changes.
          MAPPING="apps/web/components/pregame/audio-mapping.ts"
          SW="apps/web/public/sw.js"
          TS_BUST=$(grep -oE '^[^/]*AUDIO_CACHE_BUST[[:space:]]*=[[:space:]]*"[^"]*"' "$MAPPING" | grep -oE '"[^"]*"' | head -1 || true)
          SW_BUST=$(grep -oE '^[^/]*AUDIO_CACHE_BUST[[:space:]]*=[[:space:]]*"[^"]*"' "$SW" | grep -oE '"[^"]*"' | head -1 || true)
          echo "audio-mapping.ts AUDIO_CACHE_BUST = ${TS_BUST:-<none>}"
          echo "sw.js            AUDIO_CACHE_BUST = ${SW_BUST:-<none>}"
          if [ -z "$TS_BUST" ] || [ -z "$SW_BUST" ]; then
            echo "::error::Could not find AUDIO_CACHE_BUST in both $MAPPING and $SW."
            exit 1
          fi
          if [ "$TS_BUST" != "$SW_BUST" ]; then
            echo "::error file=${SW}::AUDIO_CACHE_BUST mismatch — $MAPPING has ${TS_BUST}, $SW has ${SW_BUST}. Bump both in the same PR (CLAUDE.md → Project Workflow Config)."
            exit 1
          fi
          echo "✓ AUDIO_CACHE_BUST is in sync ($TS_BUST)."

# NOTE: The automated kids-privacy-officer CI gate was removed while the
# repo is pre-MVP (no schema, no auth, no journal code — nothing for the
# officer to find on any current PR). Privacy review is now invoked
# manually from a Claude Code session before merging any PR that touches
# privacy-relevant paths:
#   apps/web/**, supabase/**, packages/content/**, .claude/agents/**,
#   CLAUDE.md, docs/brand.md
#
# When schema / auth / journal code starts landing, re-enable a privacy
# review job here. The previous implementation (path filter + `tee`
# output streaming + skip-notice comment) is preserved in git history on
# the abandoned `hotfix/ci-privacy-review-resilience` branch and is the
# right starting point for re-enabling. Pin a cheap model when you do —
# claude-haiku-4-5-20251001 is sufficient for rule-checklist work.