name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: Build + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect lockfile
        id: lockfile
        run: |
          if [ -f package-lock.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No package-lock.json — repo not yet bootstrapped. Skipping npm steps."
          fi
      - uses: actions/setup-node@v4
        if: steps.lockfile.outputs.exists == 'true'
        with:
          node-version: '20'
          cache: 'npm'
      - if: steps.lockfile.outputs.exists == 'true'
        run: npm ci
      - if: steps.lockfile.outputs.exists == 'true'
        run: npm run typecheck
      - if: steps.lockfile.outputs.exists == 'true'
        run: npm run build

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect lockfile
        id: lockfile
        run: |
          if [ -f package-lock.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No package-lock.json — repo not yet bootstrapped. Skipping npm steps."
          fi
      - uses: actions/setup-node@v4
        if: steps.lockfile.outputs.exists == 'true'
        with:
          node-version: '20'
          cache: 'npm'
      - if: steps.lockfile.outputs.exists == 'true'
        run: npm ci
      - if: steps.lockfile.outputs.exists == 'true'
        run: npm test --if-present

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect lockfile
        id: lockfile
        run: |
          if [ -f package-lock.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No package-lock.json — repo not yet bootstrapped. Skipping npm steps."
          fi
      - uses: actions/setup-node@v4
        if: steps.lockfile.outputs.exists == 'true'
        with:
          node-version: '20'
          cache: 'npm'
      - if: steps.lockfile.outputs.exists == 'true'
        run: npm ci
      - if: steps.lockfile.outputs.exists == 'true'
        run: npm run lint --if-present

# NOTE: The automated kids-privacy-officer CI gate was removed while the
# repo is pre-MVP (no schema, no auth, no journal code — nothing for the
# officer to find on any current PR). Privacy review is now invoked
# manually from a Claude Code session before merging any PR that touches
# privacy-relevant paths:
#   apps/web/**, supabase/**, packages/content/**, .claude/agents/**,
#   CLAUDE.md, docs/brand.md
#
# When schema / auth / journal code starts landing, re-enable a privacy
# review job here. The previous implementation (path filter + `tee`
# output streaming + skip-notice comment) is preserved in git history on
# the abandoned `hotfix/ci-privacy-review-resilience` branch and is the
# right starting point for re-enabling. Pin a cheap model when you do —
# claude-haiku-4-5-20251001 is sufficient for rule-checklist work.