<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Bottom Tab Bar</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);padding:24px;color:var(--fg);}
  .phone{max-width:440px;margin:0 auto;}
  .bar{background:var(--bg-elev-1);border:1px solid var(--border);border-radius:var(--r-xl);padding:14px 8px;display:grid;grid-template-columns:repeat(5,1fr);}
  .tab{display:flex;flex-direction:column;align-items:center;gap:5px;padding:6px 0;color:rgba(247,247,247,0.72);}
  .tab.on{color:var(--fv-gold);}
  .tab svg{width:22px;height:22px;}
  .label{font-family:var(--font-mono);font-size:9px;letter-spacing:0.16em;text-transform:uppercase;}
  .desc{margin-top:14px;text-align:center;font-family:var(--font-mono);font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--fg-3);}
</style>
</head>
<body>
  <div class="phone">
    <div class="bar">
      <div class="tab on">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 11l9-7 9 7v9a2 2 0 0 1-2 2h-4v-7H9v7H5a2 2 0 0 1-2-2v-9z"/></svg>
        <span class="label">Today</span>
      </div>
      <div class="tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h12a3 3 0 0 1 3 3v11l-4-2H4z"/><path d="M8 10h7M8 14h5"/></svg>
        <span class="label">Train</span>
      </div>
      <div class="tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h12l4 4v12H4z"/><path d="M8 9h8M8 13h8M8 17h5"/></svg>
        <span class="label">Journal</span>
      </div>
      <div class="tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6a2 2 0 0 1 2-2h6v17H5a2 2 0 0 0-2 2V6z"/><path d="M21 6a2 2 0 0 0-2-2h-6v17h6a2 2 0 0 1 2 2V6z"/></svg>
        <span class="label">Word</span>
      </div>
      <div class="tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c1.5-4 5-6 8-6s6.5 2 8 6"/></svg>
        <span class="label">You</span>
      </div>
    </div>
    <div class="desc">76 PX · 5 TABS · GOLD FILL ON SELECTED</div>
  </div>
</body>
</html>
