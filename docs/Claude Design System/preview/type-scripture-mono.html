<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type — Scripture & Mono</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);padding:28px;}
  .verse-card{background:var(--bg-elev-1);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px 28px;display:flex;flex-direction:column;gap:14px;}
  .ref{font-family:var(--font-mono);font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--fv-gold);}
  .mono-row{display:flex;gap:16px;margin-top:18px;align-items:center;}
  .tag{font-family:var(--font-mono);font-size:11px;letter-spacing:0.12em;text-transform:uppercase;background:var(--bg-elev-2);color:var(--fg-2);padding:6px 10px;border-radius:var(--r-pill);border:1px solid var(--border);}
  .meta{font-family:var(--font-mono);font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--fg-3);}
</style>
</head>
<body>
  <div class="verse-card">
    <span class="ref">Romans 8:37 · NIV</span>
    <p class="fv-scripture">In all these things we are more than conquerors through him who loved us.</p>
  </div>
  <div class="mono-row">
    <span class="meta">Mono · JetBrains Mono</span>
    <span class="tag">Pre-game</span>
    <span class="tag">Hockey</span>
    <span class="tag">2 min</span>
  </div>
</body>
</html>
