<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Logo — Lockups</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);}
  .wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);padding:1px;}
  .tile{background:var(--bg-elev-1);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px 18px;min-height:260px;gap:14px;}
  .tile.light{background:#F7F7F7;}
  .tile.gold-bg{background:#1A0F00;}
  .tile img{max-height:140px;max-width:100%;width:auto;}
  .label{font-family:var(--font-mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--fg-3);}
  .tile.light .label{color:#666;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="tile">
      <img src="../assets/logo-icon.svg" alt="Icon mark">
      <span class="label">Icon · Gold</span>
    </div>
    <div class="tile">
      <img src="../assets/logo-icon-mono-white.svg" alt="Icon white" style="max-height:130px;">
      <span class="label">Icon · Mono White</span>
    </div>
    <div class="tile light">
      <img src="../assets/logo-icon-mono-black.svg" alt="Icon black" style="max-height:130px;">
      <span class="label">Icon · Mono Black</span>
    </div>
  </div>
</body>
</html>
