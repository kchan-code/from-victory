<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Colors — Brand Accents</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);}
  .row{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);}
  .sw{height:230px;display:flex;flex-direction:column;justify-content:space-between;padding:22px;color:#050505;}
  .name{font-family:var(--font-display);font-weight:800;text-transform:uppercase;font-size:22px;letter-spacing:0.06em;}
  .hex{font-family:var(--font-mono);font-size:12px;letter-spacing:0.1em;}
  .role{font-family:var(--font-mono);font-size:10px;letter-spacing:0.18em;text-transform:uppercase;opacity:0.7;}
  .swatch-meta{display:flex;justify-content:space-between;align-items:flex-end;}
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:#DFAF37;">
      <div>
        <div class="name">Warm<br>Athletic Gold</div>
      </div>
      <div class="swatch-meta">
        <span class="hex">#DFAF37</span>
        <span class="role">--fv-gold · accent</span>
      </div>
    </div>
    <div class="sw" style="background:#F4C24F;">
      <div>
        <div class="name">Bright Gold<br>Highlight</div>
      </div>
      <div class="swatch-meta">
        <span class="hex">#F4C24F</span>
        <span class="role">--accent-hot · hover</span>
      </div>
    </div>
    <div class="sw" style="background:#B5892A;color:#F7F7F7;">
      <div>
        <div class="name">Gold Deep</div>
      </div>
      <div class="swatch-meta">
        <span class="hex">#B5892A</span>
        <span class="role">--fv-gold-deep · press</span>
      </div>
    </div>
  </div>
</body>
</html>
