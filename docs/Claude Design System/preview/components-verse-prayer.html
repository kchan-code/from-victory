<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Verse Card & Prayer Surface</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);padding:24px;color:var(--fg);}
  .grid{display:grid;grid-template-columns:1.2fr 0.8fr;gap:16px;}
  .verse{
    background:radial-gradient(120% 80% at 30% 0%, rgba(223,175,55,0.07), transparent 60%), var(--bg-elev-1);
    border:1px solid var(--border);border-radius:var(--r-lg);
    padding:24px;display:flex;flex-direction:column;gap:14px;min-height:200px;justify-content:space-between;
  }
  .ref{font-family:var(--font-mono);font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--fv-gold);}
  .flame{width:18px;height:24px;}
  .header{display:flex;align-items:center;gap:10px;}
  .prayer{
    background:radial-gradient(120% 90% at 50% 0%, rgba(36,91,255,0.10), transparent 70%), var(--bg-elev-1);
    border:1px solid var(--border);border-radius:var(--r-lg);
    padding:24px;display:flex;flex-direction:column;justify-content:space-between;gap:16px;
  }
  .pttl{font-family:var(--font-heading);font-weight:600;font-size:18px;}
  .breath{align-self:flex-start;width:74px;height:74px;border-radius:50%;border:1px solid rgba(36,91,255,0.4);display:flex;align-items:center;justify-content:center;color:var(--fv-cobalt-bright);font-family:var(--font-mono);font-size:11px;letter-spacing:0.16em;text-transform:uppercase;}
</style>
</head>
<body>
  <div class="grid">
    <div class="verse">
      <div class="header">
        <img src="../assets/mark-flame.svg" class="flame" alt="">
        <span class="ref">Romans 8:37 · NIV</span>
      </div>
      <p class="fv-scripture">In all these things we are more than conquerors through him who loved us.</p>
      <span style="font-family:var(--font-heading);color:var(--fv-gold);font-size:14px;font-weight:600;">Reflect →</span>
    </div>
    <div class="prayer">
      <span class="fv-eyebrow">Pre-game · 60 sec</span>
      <div class="breath">Inhale</div>
      <div>
        <div class="pttl">Three breaths. Reset.</div>
        <div style="font-family:var(--font-body);font-size:13px;color:var(--fg-2);margin-top:6px;">Your identity is secure before this shift starts.</div>
      </div>
    </div>
  </div>
</body>
</html>
