<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Colors — Semantic & Text</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);font-family:var(--font-body);color:var(--fg);}
  .layout{display:grid;grid-template-columns:1.1fr 0.9fr;gap:1px;background:var(--border);}
  .col{background:var(--bg);padding:22px;display:flex;flex-direction:column;gap:14px;}
  .label{font-family:var(--font-mono);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--fg-3);}
  .state{display:flex;align-items:center;gap:14px;}
  .dot{width:18px;height:18px;border-radius:50%;flex:none;}
  .nm{font-family:var(--font-heading);font-weight:600;font-size:14px;}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);margin-left:auto;}
  .txt{display:flex;flex-direction:column;gap:10px;}
  .tx{display:flex;align-items:baseline;gap:14px;}
  .tx .swatch{width:10px;height:10px;border-radius:50%;flex:none;display:inline-block;}
  .tx .name{font-family:var(--font-heading);font-weight:600;font-size:13px;}
  .tx .ex{font-family:var(--font-body);font-size:13px;}
</style>
</head>
<body>
  <div class="layout">
    <div class="col">
      <div class="label">Semantic states</div>
      <div class="state"><span class="dot" style="background:#4FC78A"></span><span class="nm">Success</span><span class="hex">#4FC78A</span></div>
      <div class="state"><span class="dot" style="background:#E8A33A"></span><span class="nm">Warning</span><span class="hex">#E8A33A</span></div>
      <div class="state"><span class="dot" style="background:#E5564C"></span><span class="nm">Danger</span><span class="hex">#E5564C</span></div>
      <div class="state"><span class="dot" style="background:#3D72FF"></span><span class="nm">Info</span><span class="hex">#3D72FF</span></div>
    </div>
    <div class="col">
      <div class="label">Text · on Onyx</div>
      <div class="txt">
        <div class="tx"><span class="swatch" style="background:#F7F7F7"></span><span class="name">Primary</span><span class="ex" style="color:#F7F7F7">Compete from victory.</span></div>
        <div class="tx"><span class="swatch" style="background:rgba(247,247,247,0.72)"></span><span class="name">Secondary</span><span class="ex" style="color:rgba(247,247,247,0.72)">Today's rhythm is ready.</span></div>
        <div class="tx"><span class="swatch" style="background:rgba(247,247,247,0.48)"></span><span class="name">Tertiary</span><span class="ex" style="color:rgba(247,247,247,0.48)">2 min · Pre-game reset</span></div>
        <div class="tx"><span class="swatch" style="background:rgba(247,247,247,0.28)"></span><span class="name">Disabled</span><span class="ex" style="color:rgba(247,247,247,0.28)">Not started yet</span></div>
      </div>
    </div>
  </div>
</body>
</html>
