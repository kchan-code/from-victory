<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Module Tiles & Chips</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);padding:24px;color:var(--fg);}
  .chips{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
  .chip{font-family:var(--font-mono);font-size:11px;letter-spacing:0.12em;text-transform:uppercase;background:var(--bg-elev-2);color:var(--fg-2);padding:7px 12px;border-radius:999px;border:1px solid var(--border);}
  .chip.gold{background:transparent;color:var(--fv-gold);border-color:rgba(223,175,55,0.5);}
  .chip.cobalt{background:rgba(36,91,255,0.12);color:var(--fv-cobalt-bright);border-color:rgba(36,91,255,0.4);}
  .tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  .tile{background:var(--bg-elev-1);border:1px solid var(--border);border-radius:var(--r-md);padding:16px;display:flex;flex-direction:column;justify-content:space-between;min-height:130px;}
  .ico{width:34px;height:34px;border-radius:10px;background:var(--fv-gold-soft);display:flex;align-items:center;justify-content:center;}
  .ico svg{stroke:var(--fv-gold);width:18px;height:18px;}
  .tnm{font-family:var(--font-heading);font-weight:600;font-size:15px;}
  .tmeta{font-family:var(--font-mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--fg-3);}
  .trow{display:flex;justify-content:space-between;align-items:flex-end;margin-top:14px;}
</style>
</head>
<body>
  <div class="chips">
    <span class="chip">Daily</span>
    <span class="chip">Hockey</span>
    <span class="chip gold">Pre-game</span>
    <span class="chip cobalt">In progress</span>
    <span class="chip">2 min</span>
  </div>
  <div class="tiles">
    <div class="tile">
      <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h10"/></svg></div>
      <div class="trow"><span class="tnm">Devotional</span><span class="tmeta">3 min</span></div>
    </div>
    <div class="tile">
      <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7-3-3-7 7v3h3z"/><path d="M14 7l3 3"/></svg></div>
      <div class="trow"><span class="tnm">Journal</span><span class="tmeta">5 min</span></div>
    </div>
    <div class="tile">
      <div class="ico"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></div>
      <div class="trow"><span class="tnm">Pre-game</span><span class="tmeta">2 min</span></div>
    </div>
  </div>
</body>
</html>
