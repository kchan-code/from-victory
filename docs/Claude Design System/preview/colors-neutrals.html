<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Colors — Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg-elev-1);}
  .row{display:grid;grid-template-columns:repeat(6,1fr);gap:0;padding:0;}
  .sw{height:230px;display:flex;flex-direction:column;justify-content:flex-end;padding:18px;border-right:1px solid var(--border);}
  .sw:last-child{border-right:0;}
  .name{font-family:var(--font-heading);font-size:13px;font-weight:600;}
  .hex{font-family:var(--font-mono);font-size:11px;letter-spacing:0.1em;margin-top:4px;opacity:0.7;}
  .role{font-family:var(--font-mono);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;opacity:0.5;margin-top:8px;}
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:#050505;color:var(--fg);">
      <div class="name">Onyx</div><div class="hex">#050505</div><div class="role">--fv-onyx · bg</div>
    </div>
    <div class="sw" style="background:#101010;color:var(--fg);">
      <div class="name">Deep Charcoal</div><div class="hex">#101010</div><div class="role">--fv-charcoal · cards</div>
    </div>
    <div class="sw" style="background:#151515;color:var(--fg);">
      <div class="name">Surface 1</div><div class="hex">#151515</div><div class="role">--bg-elev-2</div>
    </div>
    <div class="sw" style="background:#1C1C1C;color:var(--fg);">
      <div class="name">Surface 2</div><div class="hex">#1C1C1C</div><div class="role">--bg-elev-3 · inputs</div>
    </div>
    <div class="sw" style="background:#D9DCE1;color:#050505;">
      <div class="name">Silver White</div><div class="hex">#D9DCE1</div><div class="role">--fv-silver</div>
    </div>
    <div class="sw" style="background:#F7F7F7;color:#050505;">
      <div class="name">Clean White</div><div class="hex">#F7F7F7</div><div class="role">--fv-white · fg</div>
    </div>
  </div>
</body>
</html>
