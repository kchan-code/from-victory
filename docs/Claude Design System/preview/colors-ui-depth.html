<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Colors — UI & Depth</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);}
  .sw{height:230px;display:flex;flex-direction:column;justify-content:space-between;padding:20px;color:#F7F7F7;}
  .name{font-family:var(--font-heading);font-weight:600;font-size:16px;}
  .sub{font-family:var(--font-body);font-size:11px;color:rgba(247,247,247,0.6);margin-top:4px;text-wrap:pretty;}
  .hex{font-family:var(--font-mono);font-size:11px;letter-spacing:0.1em;}
  .role{font-family:var(--font-mono);font-size:9px;letter-spacing:0.16em;text-transform:uppercase;opacity:0.7;}
  .swatch-meta{display:flex;justify-content:space-between;align-items:flex-end;}
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:#245BFF;">
      <div>
        <div class="name">Electric Cobalt</div>
        <div class="sub">UI progress, focus, interaction — never logo.</div>
      </div>
      <div class="swatch-meta"><span class="hex">#245BFF</span><span class="role">--fv-cobalt</span></div>
    </div>
    <div class="sw" style="background:#3D72FF;">
      <div>
        <div class="name">Cobalt Bright</div>
        <div class="sub">Hover / active on cobalt.</div>
      </div>
      <div class="swatch-meta"><span class="hex">#3D72FF</span><span class="role">--fv-cobalt-bright</span></div>
    </div>
    <div class="sw" style="background:#071A33;">
      <div>
        <div class="name">Deep Royal Navy</div>
        <div class="sub">Depth bg option — splash, prayer.</div>
      </div>
      <div class="swatch-meta"><span class="hex">#071A33</span><span class="role">--fv-navy</span></div>
    </div>
    <div class="sw" style="background:#24113F;">
      <div>
        <div class="name">Deep Purple</div>
        <div class="sub">Faith-forward depth option.</div>
      </div>
      <div class="swatch-meta"><span class="hex">#24113F</span><span class="role">--fv-purple</span></div>
    </div>
  </div>
</body>
</html>
